<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Planes de Suscripción</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <section class="pricing-section" aria-labelledby="pricing-title">
        <header class="pricing-header">
          <h1 id="pricing-title">Elige tu plan</h1>
          <p class="pricing-subtitle">
            Accede a funciones avanzadas y potencia el rendimiento de tus deportistas.
          </p>
        </header>

        <div class="stripe-pricing" aria-label="Tabla de precios de Stripe">
          <script async src="https://js.stripe.com/v3/pricing-table.js"></script>
          <stripe-pricing-table
            pricing-table-id="REPLACE_ME"
            publishable-key="REPLACE_ME"
          ></stripe-pricing-table>
        </div>

        <div class="legal-note">
          <p class="legal-note__line">
            *Se aplican límites de uso. Los precios mostrados no incluyen los impuestos aplicables.
          </p>
          <p class="legal-note__line">
            Se le cobrará un 21% de VAT, la tarifa estándar en España, al finalizar la compra.
          </p>
        </div>
      </section>
    </main>
  </body>
</html>
