<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Enterprise - Contacto</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="enterprise-page">
    <main>
      <section class="enterprise-hero">
        <div class="enterprise-hero__left">
          <p class="enterprise-hero__eyebrow">Enterprise</p>
          <h1>Let’s find the right fit for your team</h1>
          <p class="enterprise-hero__subtitle">
            Cada organización es única. Completa el formulario y te contactaremos para entender tus
            objetivos y ayudarte a escalar tu rendimiento deportivo.
          </p>

          <div class="enterprise-hero__avatars">
            <img
              src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&w=420&q=80"
              alt="Entrenadora deportiva"
            />
            <img
              src="https://images.unsplash.com/photo-1544723795-3fb6469f5b39?auto=format&fit=crop&w=420&q=80"
              alt="Entrenador deportivo"
            />
            <img
              src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=420&q=80"
              alt="Profesional del deporte"
            />
          </div>
        </div>

        <div class="enterprise-hero__right">
          <form class="enterprise-form" action="#" method="post">
            <label>
              Nombre
              <input type="text" name="name" placeholder="Jane Smith" />
            </label>
            <label>
              Email
              <input type="email" name="email" placeholder="jane@empresa.com" />
            </label>
            <label>
              Mensaje
              <textarea name="message" rows="4" placeholder="Cuéntanos tus necesidades"></textarea>
            </label>
            <button type="submit">Send message</button>
          </form>
        </div>
      </section>
    </main>
  </body>
</html>
